<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Solidicon game test links</title>
  <style>
    :root {
      color-scheme: light dark;
      --bg: #0e0f12;
      --fg: #e8eaed;
      --muted: #9aa0a6;
      --card: #16181d;
      --border: rgba(255,255,255,0.08);
      --accent: #7aa2ff;
    }
    @media (prefers-color-scheme: light) {
      :root {
        --bg: #f7f7f8;
        --fg: #1a1a1a;
        --muted: #5f6368;
        --card: #ffffff;
        --border: rgba(0,0,0,0.08);
        --accent: #2b59d6;
      }
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--bg); color: var(--fg); }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      -webkit-font-smoothing: antialiased;
      padding: 1.25rem 1rem 4rem;
      max-width: 1280px;
      margin: 0 auto;
    }
    header { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 1.25rem; gap: 1rem; flex-wrap: wrap; }
    h1 { font-size: 1.5rem; margin: 0; letter-spacing: -0.01em; }
    .sub { color: var(--muted); font-size: 0.85rem; }

    .grid {
      display: grid;
      gap: 0.6rem;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    }
    @media (min-width: 600px) {
      .grid { gap: 0.9rem; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); }
    }

    .card {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: transform 0.12s ease, border-color 0.12s ease;
      position: relative;
    }
    .card:active { transform: scale(0.98); }
    @media (hover: hover) {
      .card:hover { border-color: var(--accent); }
    }

    .thumb {
      aspect-ratio: 725 / 460;
      background: #000 center/cover no-repeat;
      display: block;
    }
    .thumb.placeholder {
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 0.85rem;
      background: repeating-linear-gradient(45deg, rgba(255,255,255,0.02) 0 10px, transparent 10px 20px), var(--card);
    }

    .meta { padding: 0.5rem 0.6rem 0.6rem; }
    .title { font-weight: 600; font-size: 0.8rem; line-height: 1.2; }
    .tag {
      display: inline-block;
      margin-top: 0.3rem;
      font-size: 0.62rem;
      color: var(--muted);
      padding: 0.05rem 0.4rem;
      border: 1px solid var(--border);
      border-radius: 999px;
    }
    @media (min-width: 600px) {
      .meta { padding: 0.7rem 0.85rem 0.85rem; }
      .title { font-size: 0.95rem; line-height: 1.25; }
      .tag { font-size: 0.7rem; margin-top: 0.35rem; padding: 0.1rem 0.45rem; }
    }
    .tag.warn { color: #e0a64a; border-color: rgba(224,166,74,0.4); }
    .tag.dead { color: #e06b6b; border-color: rgba(224,107,107,0.4); }

    .card.disabled { opacity: 0.45; pointer-events: none; }
    .card.todo { border-style: dashed; }
  </style>
</head>
